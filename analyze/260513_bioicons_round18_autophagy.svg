<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 600"><defs>
<symbol id="lysosome" viewBox="0 0 60 60" overflow="visible">
        
        <circle cx="30" cy="30" r="26" fill="#E2C5D8" stroke="#7F4A6F" stroke-width="2" />
        
        <circle cx="22" cy="22" r="2.5" fill="#7F4A6F" />
        <circle cx="38" cy="20" r="2.5" fill="#7F4A6F" />
        <circle cx="42" cy="35" r="2.5" fill="#7F4A6F" />
        <circle cx="22" cy="40" r="2.5" fill="#7F4A6F" />
        <circle cx="33" cy="44" r="2.5" fill="#7F4A6F" />
        <circle cx="30" cy="30" r="2.5" fill="#7F4A6F" />
    </symbol>
<symbol id="mitochondrion" viewBox="0 0 150 80" overflow="visible">
        <ellipse cx="75" cy="40" rx="70" ry="35" fill="#F5D4C5" stroke="#8B4A2A" stroke-width="2.5" />
        <path d="M 30 26 Q 40 36 50 26 Q 60 16 70 26" fill="none" stroke="#8B4A2A" stroke-width="1.5" />
        <path d="M 30 54 Q 40 44 50 54 Q 60 64 70 54" fill="none" stroke="#8B4A2A" stroke-width="1.5" />
        <path d="M 80 26 Q 90 36 100 26 Q 110 16 120 26" fill="none" stroke="#8B4A2A" stroke-width="1.5" />
        <path d="M 80 54 Q 90 44 100 54 Q 110 64 120 54" fill="none" stroke="#8B4A2A" stroke-width="1.5" />
    </symbol>
<symbol id="autophagosome" viewBox="0 0 80 80" overflow="visible">
        
        <circle cx="40" cy="40" r="36" fill="#E8F0F2" stroke="#5F7F8C" stroke-width="2" />
        
        <circle cx="40" cy="40" r="30" fill="#FAFAFA" stroke="#5F7F8C" stroke-width="2" />
        
        <ellipse cx="40" cy="40" rx="20" ry="11" fill="#F5D4C5" stroke="#8B4A2A" stroke-width="1.5" />
        <path d="M 28 40 Q 34 36 40 40 Q 46 44 52 40" fill="none" stroke="#8B4A2A" stroke-width="1.2" />
    </symbol>
</defs>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
  </defs>

  <text x="900" y="38" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Mitophagy: selective autophagy of damaged mitochondria</text>

  
  <g id="stage_1_damaged_mitochondrion" data-role="stage">
    <use href="#mitochondrion" x="200" y="150" width="150" height="80" />
    <text x="275" y="270" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle">1. Damaged Mitochondrion</text>
    <text x="275" y="300" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">(Cytoplasm)</text>
  </g>

  
  <line x1="380" y1="190" x2="520" y2="190" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />

  
  <g id="stage_2_autophagosome_formation" data-role="stage">
    <use href="#autophagosome" x="550" y="140" width="100" height="100" />
    <text x="600" y="270" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle">2. Autophagosome Formation</text>
    <text x="600" y="300" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">(Engulfing damaged mito)</text>
  </g>

  
  <line x1="680" y1="190" x2="820" y2="190" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />

  
  <g id="stage_3_autolysosome_formation" data-role="stage">
    
    <g id="fusion_components">
      <use href="#autophagosome" x="840" y="150" width="80" height="80" />
      <use href="#lysosome" x="900" y="150" width="60" height="60" />
      <text x="900" y="235" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#666666" text-anchor="middle">Autophagosome + Lysosome</text>
    </g>
    
    <line x1="970" y1="190" x2="1020" y2="190" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />

    
    <g id="autolysosome_intact">
      <circle cx="1070" cy="190" r="60" fill="#EEDDF2" stroke="#7F4A9C" stroke-width="2" /> 
      
      <circle cx="1045" cy="175" r="3" fill="#7F4A9C" />
      <circle cx="1090" cy="195" r="3" fill="#7F4A9C" />
      <circle cx="1060" cy="205" r="3" fill="#7F4A9C" />
      
      <ellipse cx="1070" cy="190" rx="30" ry="20" fill="#f0e0c0" stroke="#d0b090" stroke-width="1.5" />
      <line x1="1055" y1="180" x2="1085" y2="200" stroke="#d0b090" stroke-width="1.5" />
      <line x1="1055" y1="200" x2="1085" y2="180" stroke="#d0b090" stroke-width="1.5" />
    </g>

    <text x="1070" y="270" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle">3. Autophagosome-Lysosome Fusion</text>
    <text x="1070" y="300" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">(Autolysosome)</text>
  </g>

  
  <line x1="1150" y1="190" x2="1290" y2="190" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />

  
  <g id="stage_4_mitochondrial_degradation" data-role="stage">
    
    <g id="autolysosome_degraded">
      <circle cx="1370" cy="190" r="60" fill="#EEDDF2" stroke="#7F4A9C" stroke-width="2" />
      
      <circle cx="1345" cy="175" r="3" fill="#7F4A9C" />
      <circle cx="1390" cy="195" r="3" fill="#7F4A9C" />
      <circle cx="1360" cy="205" r="3" fill="#7F4A9C" />
      
      <circle cx="1350" cy="180" r="10" fill="#f0e0c0" opacity="0.6" />
      <rect x="1360" y="200" width="15" height="10" fill="#f0e0c0" opacity="0.6" transform="rotate(20 1367 205)" />
      <polygon points="1380,170 1395,175 1385,185" fill="#f0e0c0" opacity="0.6" />
      <circle cx="1375" cy="190" r="8" fill="#f0e0c0" opacity="0.6" />
    </g>

    <text x="1370" y="270" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle">4. Mitochondrial Degradation</text>
    <text x="1370" y="300" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">(Recycling components)</text>
  </g>
</svg>