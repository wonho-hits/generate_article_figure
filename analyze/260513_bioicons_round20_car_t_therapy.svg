<symbol id="caspase" viewBox="0 0 72 52" overflow="visible">
        
        <ellipse cx="26" cy="26" rx="22" ry="18" fill="#C5A8E2" stroke="#5F3A8C" stroke-width="2" />
        <ellipse cx="58" cy="26" rx="13" ry="11" fill="#D8BCE8" stroke="#5F3A8C" stroke-width="2" />
        
        <path d="M 42 14 Q 47 26 42 38" fill="none" stroke="#3F2A5C" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="3,2" />
        
        <text x="26" y="30" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#3F2A5C" font-weight="bold">Cys</text>
    </symbol>
</defs>
    <defs>
        <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
        </marker>
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.2" />
        </filter>

        
        <symbol id="car_receptor" viewBox="0 0 50 120">
            <g stroke="#2b6cb0" stroke-width="2" fill="none">
                
                <path d="M25 0 L10 40 M25 0 L40 40 M25 0 L25 60" />
                
                <line x1="25" y1="60" x2="25" y2="90" stroke="#2b6cb0" stroke-width="3" />
                
                <circle cx="25" cy="100" r="6" fill="#2b6cb0" stroke="none" />
                <circle cx="25" cy="115" r="6" fill="#2b6cb0" stroke="none" />
            </g>
        </symbol>

        
        <symbol id="cytotoxic_granule" viewBox="0 0 20 20">
            <circle cx="10" cy="10" r="8" fill="#d65a31" stroke="#a03c20" stroke-width="1.5" />
            <text x="10" y="14" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">G</text>
        </symbol>
    </defs>

    <g id="figure_title" data-role="title">
        <text x="900" y="50" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">CAR-T Cell Therapy Mechanism</text>
    </g>

    <g id="t_cell_group" data-role="t_cell_complex">
        <use href="#bioicons_t_lymphocyte" x="225" y="370" width="150" height="154" filter="url(#shadow)" />
        <text x="300" y="560" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle">CD8+ T cell</text>
        <g id="car_receptor_on_t_cell" data-role="car_receptor">
            <use href="#car_receptor" x="350" y="300" width="50" height="120" />
            <text x="400" y="330" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#2b6cb0" font-weight="bold">CAR</text>
        </g>
    </g>

    <g id="cancer_cell_group" data-role="cancer_cell_complex">
        <use href="#bioicons_cancer_cell" x="975" y="370" width="170" height="185" filter="url(#shadow)" />
        <text x="1060" y="560" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="middle">Cancer Cell</text>
        <g id="tumor_antigen" data-role="tumor_antigen">
            <circle cx="975" cy="400" r="25" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5" />
            <text x="905" y="370" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#1a1a1a" text-anchor="end">Tumor Antigen</text>
        </g>
    </g>

    <g id="recognition_binding_pathway" data-role="pathway_step">
        <path d="M400 360 C 500 300, 800 300, 950 375" fill="none" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />
        <text x="675" y="350" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">Recognition &amp; Binding</text>
    </g>

    <g id="cytotoxic_granules_inside_t_cell" data-role="cytotoxic_granules">
        <use href="#cytotoxic_granule" x="250" y="650" width="30" height="30" />
        <use href="#cytotoxic_granule" x="280" y="660" width="30" height="30" />
        <use href="#cytotoxic_granule" x="310" y="650" width="30" height="30" />
        <text x="300" y="710" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">Perforin/Granzyme</text>
    </g>

    <g id="granule_release_pathway" data-role="pathway_step">
        <path d="M370 670 C 550 670, 800 670, 1100 696" fill="none" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />
        <text x="735" y="640" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#333" text-anchor="middle">Granule Release</text>
    </g>

    <g id="caspase_cascade_pathway" data-role="pathway_step">
        <g id="caspase_8_activation">
            <use href="#caspase" x="1200" y="670" width="72" height="52" filter="url(#shadow)" />
            <text x="1236" y="650" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">Caspase-8</text>
        </g>
