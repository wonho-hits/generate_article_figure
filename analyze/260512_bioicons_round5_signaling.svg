<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900"><defs>
<symbol id="transcription_factor" viewBox="0 0 60 50" overflow="visible">
        
        <path d="M 10 30 Q 10 6 30 6 Q 50 6 50 30 Z" fill="#B5D4A8" stroke="#4A7A3F" stroke-width="2" stroke-linejoin="round" />
        
        <line x1="17" y1="30" x2="17" y2="42" stroke="#4A7A3F" stroke-width="2.5" stroke-linecap="round" />
        <line x1="43" y1="30" x2="43" y2="42" stroke="#4A7A3F" stroke-width="2.5" stroke-linecap="round" />
        
        <path d="M 2 45 Q 12 41 22 45 T 42 45 Q 52 41 58 45" fill="none" stroke="#888888" stroke-width="1.5" />
        <path d="M 2 48 Q 12 52 22 48 T 42 48 Q 52 52 58 48" fill="none" stroke="#888888" stroke-width="1.5" />
    </symbol>
<symbol id="nucleus" viewBox="0 0 200 150" overflow="visible">
        <ellipse cx="100" cy="75" rx="92" ry="65" fill="#F0E0F0" stroke="#5A2A7C" stroke-width="2.5" />
        <ellipse cx="100" cy="75" rx="86" ry="60" fill="none" stroke="#5A2A7C" stroke-width="1" opacity="0.6" />
        <circle cx="20" cy="60" r="3" fill="#5A2A7C" />
        <circle cx="180" cy="65" r="3" fill="#5A2A7C" />
        <circle cx="100" cy="12" r="3" fill="#5A2A7C" />
        <circle cx="100" cy="138" r="3" fill="#5A2A7C" />
    </symbol>
<symbol id="small_gtpase" viewBox="0 0 52 48" overflow="visible">
        
        <path d="M 26 4 L 46 36 Q 26 46 6 36 Z" fill="#C5B5D4" stroke="#5F4A7F" stroke-width="2" stroke-linejoin="round" />
        
        <circle cx="36" cy="24" r="7" fill="#FFE8B0" stroke="#C8901F" stroke-width="1.5" />
        <text x="36" y="27" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#C8901F" font-weight="bold">T</text>
    </symbol>
<symbol id="p_badge" viewBox="0 0 24 24" overflow="visible">
        <circle cx="12" cy="12" r="10" fill="#FF6B47" stroke="#A33020" stroke-width="1.5" />
        <text x="12" y="16" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="white" font-weight="bold">P</text>
    </symbol>
<symbol id="kinase" viewBox="0 0 80 50" overflow="visible">
        <ellipse cx="40" cy="25" rx="35" ry="20" fill="#B5D4A8" stroke="#4A7A3F" stroke-width="2" />
    </symbol>
<symbol id="rtk" viewBox="0 0 60 100" overflow="visible">
        <rect x="10" y="5" width="40" height="32" rx="4" fill="#A8C5E2" stroke="#3A5F7F" stroke-width="2" />
        <rect x="22" y="37" width="16" height="22" fill="#A8C5E2" stroke="#3A5F7F" stroke-width="2" />
        <ellipse cx="30" cy="78" rx="22" ry="16" fill="#B5D4A8" stroke="#4A7A3F" stroke-width="2" />
        <text x="30" y="83" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#4A7A3F" font-weight="bold">K</text>
    </symbol>
</defs>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
  </defs>

  
  <g id="figure_title" data-role="title">
    <text x="800" y="38" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a" text-anchor="middle">MAPK signaling cascade: from ligand to gene expression</text>
  </g>

  
  <g id="extracellular_label" data-role="compartment_label">
    <text x="800" y="100" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#666" text-anchor="middle">Extracellular</text>
  </g>

  
  <g id="growth_factor_ligand" data-role="ligand">
    <circle cx="800" cy="170" r="20" fill="#a0d9f4" stroke="#2b6cb0" stroke-width="1.5" />
    <text x="800" y="170" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle" dy="5">GF</text>
    <text x="800" y="200" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">Growth Factor</text>
  </g>

  
  <g id="rtk_receptor" data-role="receptor">
    <use href="#rtk" x="770" y="150" width="60" height="100" />
    <text x="800" y="240" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">RTK</text>
  </g>

  
  <g id="cell_membrane" data-role="membrane">
    <line x1="0" y1="200" x2="1600" y2="200" stroke="#888" stroke-width="2" />
    <line x1="0" y1="220" x2="1600" y2="220" stroke="#888" stroke-width="2" />
  </g>

  
  <g id="cytoplasm_label" data-role="compartment_label">
    <text x="800" y="270" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#666" text-anchor="middle">Cytoplasm</text>
  </g>

  
  <g id="ras_gtpase" data-role="small_gtpase">
    <use href="#small_gtpase" x="774" y="300" width="52" height="48" />
    <text x="800" y="358" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">Ras</text>
  </g>

  
  <g id="raf_kinase" data-role="kinase">
    <use href="#kinase" x="760" y="380" width="80" height="50" />
    <text x="800" y="445" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">Raf</text>
  </g>

  
  <g id="mek_kinase" data-role="kinase">
    <use href="#kinase" x="760" y="460" width="80" height="50" />
    <text x="800" y="525" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">MEK</text>
    <use href="#p_badge" x="820" y="460" width="24" height="24" />
  </g>

  
  <g id="erk_kinase_cytoplasmic" data-role="kinase">
    <use href="#kinase" x="760" y="540" width="80" height="50" />
    <text x="800" y="605" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">ERK</text>
    <use href="#p_badge" x="820" y="540" width="24" height="24" />
  </g>

  
  <g id="nucleus_organelle" data-role="organelle">
    <use href="#nucleus" x="700" y="680" width="200" height="150" />
    <text x="800" y="700" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#666" text-anchor="middle">Nucleus</text>
  </g>

  
  <g id="erk_kinase_nuclear" data-role="kinase">
    <use href="#kinase" x="760" y="740" width="80" height="50" />
    <text x="800" y="805" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">ERK</text>
    <use href="#p_badge" x="820" y="740" width="24" height="24" />
  </g>

  
  <g id="elk1_transcription_factor" data-role="transcription_factor">
    <use href="#transcription_factor" x="770" y="810" width="60" height="50" />
    <text x="800" y="875" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">ELK-1</text>
    <use href="#p_badge" x="820" y="810" width="24" height="24" />
  </g>

  
  <g id="pathway_arrows" data-role="arrows">
    
    <path d="M 800 250 L 800 300" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    
    <path d="M 800 348 L 800 380" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    
    <path d="M 800 430 L 800 460" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    
    <path d="M 800 510 L 800 540" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    
    <path d="M 800 590 L 800 740" stroke="#333" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#arrowhead)" />
    <text x="880" y="665" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555" text-anchor="start" transform="rotate(90 880 665)">Translocation</text>
    
    <path d="M 800 790 L 800 810" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  </g>

</svg>