<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100"><defs>
<symbol id="transcription_factor" viewBox="0 0 60 50" overflow="visible">
        
        <path d="M 10 30 Q 10 6 30 6 Q 50 6 50 30 Z" fill="#B5D4A8" stroke="#4A7A3F" stroke-width="2" stroke-linejoin="round" />
        
        <line x1="17" y1="30" x2="17" y2="42" stroke="#4A7A3F" stroke-width="2.5" stroke-linecap="round" />
        <line x1="43" y1="30" x2="43" y2="42" stroke="#4A7A3F" stroke-width="2.5" stroke-linecap="round" />
        
        <path d="M 2 45 Q 12 41 22 45 T 42 45 Q 52 41 58 45" fill="none" stroke="#888888" stroke-width="1.5" />
        <path d="M 2 48 Q 12 52 22 48 T 42 48 Q 52 52 58 48" fill="none" stroke="#888888" stroke-width="1.5" />
    </symbol>
<symbol id="nucleus" viewBox="0 0 200 150" overflow="visible">
        <ellipse cx="100" cy="75" rx="92" ry="65" fill="#F0E0F0" stroke="#5A2A7C" stroke-width="2.5" />
        <ellipse cx="100" cy="75" rx="86" ry="60" fill="none" stroke="#5A2A7C" stroke-width="1" opacity="0.6" />
        <circle cx="20" cy="60" r="3" fill="#5A2A7C" />
        <circle cx="180" cy="65" r="3" fill="#5A2A7C" />
        <circle cx="100" cy="12" r="3" fill="#5A2A7C" />
        <circle cx="100" cy="138" r="3" fill="#5A2A7C" />
    </symbol>
<symbol id="generic_protein" viewBox="0 0 80 50" overflow="visible">
        <rect x="5" y="5" width="70" height="40" rx="20" fill="#D4D4D4" stroke="#666666" stroke-width="2" />
    </symbol>
<symbol id="ligand" viewBox="0 0 40 30" overflow="visible">
        
        <path d="M 20 5 Q 8 5 8 15 Q 8 25 20 25 Q 32 25 32 15 Q 32 5 20 5 Z" fill="#FFD8B0" stroke="#C86B1F" stroke-width="1.8" stroke-linejoin="round" />
        
        <circle cx="14" cy="13" r="3" fill="#FFC890" stroke="#C86B1F" stroke-width="1.2" />
        <circle cx="26" cy="17" r="3" fill="#FFC890" stroke="#C86B1F" stroke-width="1.2" />
    </symbol>
</defs>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.2" />
    </filter>
  </defs>

  
  <g id="figure_title">
    <text x="600" y="40" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Steroid Hormone Signaling Pathway</text>
  </g>

  
  <g id="compartment_labels">
    <text x="100" y="100" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#666666" text-anchor="start">Extracellular</text>
    <text x="100" y="300" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#666666" text-anchor="start">Cytoplasm</text>
    <text x="100" y="700" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#666666" text-anchor="start">Nucleus</text>
  </g>

  
  <g id="cell_membrane">
    <line x1="0" y1="250" x2="1200" y2="250" stroke="#888" stroke-width="2" />
    <line x1="0" y1="270" x2="1200" y2="270" stroke="#888" stroke-width="2" />
  </g>

  

  
  <g id="extracellular_ligand" data-role="ligand">
    <use href="#ligand" x="580" y="140" width="40" height="30" style="filter:url(#shadow);" />
    <text x="600" y="190" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Steroid Hormone</text>
    <text x="600" y="210" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#555" text-anchor="middle">(Cortisol)</text>
  </g>

  
  <g id="diffusion_arrow">
    <path d="M 600 220 L 600 300" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="630" y="260" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555" text-anchor="start">Diffusion</text>
  </g>

  
  <g id="cytoplasmic_ligand" data-role="ligand">
    <use href="#ligand" x="580" y="300" width="40" height="30" style="filter:url(#shadow);" />
  </g>

  
  <g id="unbound_nuclear_receptor" data-role="receptor">
    <use href="#generic_protein" x="560" y="380" width="80" height="50" style="filter:url(#shadow);" />
    <text x="600" y="440" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Nuclear Receptor</text>
    <text x="600" y="460" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#555" text-anchor="middle">(GR)</text>
  </g>

  
  <g id="binding_arrow">
    <path d="M 600 340 L 600 375" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="630" y="360" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555" text-anchor="start">Binding</text>
  </g>

  
  <g id="cytoplasmic_complex" data-role="transcription_factor">
    <use href="#transcription_factor" x="570" y="500" width="60" height="50" style="filter:url(#shadow);" />
    <text x="600" y="560" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Hormone-Receptor</text>
    <text x="600" y="580" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Complex</text>
  </g>

  
  <g id="translocation_arrow">
    <path d="M 600 595 L 600 645" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="630" y="620" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555" text-anchor="start">Translocation</text>
  </g>

  
  <g id="nucleus_organelle" data-role="nucleus">
    <use href="#nucleus" x="490" y="650" width="220" height="165" style="filter:url(#shadow);" />
  </g>

  
  <g id="nuclear_complex_on_dna" data-role="transcription_factor">
    <use href="#transcription_factor" x="570" y="700" width="60" height="50" style="filter:url(#shadow);" />
    <text x="600" y="760" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">DNA Binding</text>
    <text x="600" y="780" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#555" text-anchor="middle">(HRE)</text>
  </g>

  
  <g id="gene_activation_arrow">
    <path d="M 600 800 L 600 850" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="630" y="825" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555" text-anchor="start">Activation</text>
  </g>

  
  <g id="gene_transcription" data-role="gene_expression">
    <rect x="520" y="860" width="160" height="40" rx="8" ry="8" fill="#E8F2E0" stroke="#4A7A3F" stroke-width="2" style="filter:url(#shadow);" />
    <text x="600" y="885" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#4A7A3F" text-anchor="middle">Gene Transcription</text>
  </g>
</svg>