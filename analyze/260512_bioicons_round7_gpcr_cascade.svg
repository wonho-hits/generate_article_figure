<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700"><defs>
<symbol id="generic_protein" viewBox="0 0 80 50" overflow="visible">
        <rect x="5" y="5" width="70" height="40" rx="20" fill="#D4D4D4" stroke="#666666" stroke-width="2" />
    </symbol>
<symbol id="kinase" viewBox="0 0 80 50" overflow="visible">
        <ellipse cx="40" cy="25" rx="35" ry="20" fill="#B5D4A8" stroke="#4A7A3F" stroke-width="2" />
    </symbol>
<symbol id="ligand" viewBox="0 0 40 30" overflow="visible">
        
        <path d="M 20 5 Q 8 5 8 15 Q 8 25 20 25 Q 32 25 32 15 Q 32 5 20 5 Z" fill="#FFD8B0" stroke="#C86B1F" stroke-width="1.8" stroke-linejoin="round" />
        
        <circle cx="14" cy="13" r="3" fill="#FFC890" stroke="#C86B1F" stroke-width="1.2" />
        <circle cx="26" cy="17" r="3" fill="#FFC890" stroke="#C86B1F" stroke-width="1.2" />
    </symbol>
<symbol id="gpcr" viewBox="0 0 60 80" overflow="visible">
        <rect x="5" y="5" width="50" height="70" rx="6" fill="#A8C5E2" stroke="#3A5F7F" stroke-width="2" />
        <path d="M 12 14 L 48 22 L 12 30 L 48 38 L 12 46 L 48 54 L 12 62 L 48 70" fill="none" stroke="#3A5F7F" stroke-width="1.5" opacity="0.8" />
    </symbol>
<symbol id="camp" viewBox="0 0 50 32" overflow="visible">
        <polygon points="5,18 12,8 24,8 31,18 24,28 12,28" fill="#FFE8B0" stroke="#C8901F" stroke-width="1.5" />
        <circle cx="40" cy="18" r="6" fill="#FFE8B0" stroke="#C8901F" stroke-width="1.5" />
        <line x1="31" y1="18" x2="34" y2="18" stroke="#C8901F" stroke-width="1.5" />
        <path d="M 18 8 Q 18 2 25 2 Q 32 2 32 8" fill="none" stroke="#C8901F" stroke-width="1.5" />
    </symbol>
<symbol id="p_badge" viewBox="0 0 24 24" overflow="visible">
        <circle cx="12" cy="12" r="10" fill="#FF6B47" stroke="#A33020" stroke-width="1.5" />
        <text x="12" y="16" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="white" font-weight="bold">P</text>
    </symbol>
<symbol id="g_protein_trimer" viewBox="0 0 90 60" overflow="visible">
        
        <ellipse cx="28" cy="32" rx="22" ry="18" fill="#A8C5D4" stroke="#3A5F7F" stroke-width="2" />
        <text x="28" y="36" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#3A5F7F" font-weight="bold">α</text>
        
        <ellipse cx="62" cy="22" rx="16" ry="14" fill="#B5D4A8" stroke="#4A7A3F" stroke-width="2" />
        <text x="62" y="26" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#4A7A3F" font-weight="bold">β</text>
        
        <ellipse cx="74" cy="44" rx="12" ry="10" fill="#D4B8E2" stroke="#7F4A9C" stroke-width="2" />
        <text x="74" y="48" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#7F4A9C" font-weight="bold">γ</text>
    </symbol>
</defs>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
    <marker id="barhead" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 5 H 10" stroke="#333" stroke-width="2" />
    </marker>
  </defs>

  
  <g id="figure_title" data-role="title">
    <text x="800" y="40" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a" text-anchor="middle">GPCR → G-protein → adenylyl cyclase → cAMP → PKA cascade</text>
  </g>

  
  <g id="cell_membrane" data-role="structural_element">
    <line x1="0" y1="200" x2="1600" y2="200" stroke="#888" stroke-width="2" />
    <line x1="0" y1="220" x2="1600" y2="220" stroke="#888" stroke-width="2" />
  </g>

  
  <g id="compartment_labels" data-role="annotation">
    <text x="100" y="120" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555" text-anchor="start">Extracellular</text>
    <text x="100" y="300" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555" text-anchor="start">Cytoplasm</text>
  </g>

  
  <g id="adrenaline_ligand" data-role="ligand">
    <use href="#ligand" x="400" y="140" width="40" height="30" />
    <text x="420" y="125" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">Adrenaline</text>
  </g>

  
  <g id="gpcr_receptor" data-role="receptor">
    <use href="#gpcr" x="400" y="160" width="60" height="80" />
    <text x="430" y="170" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">GPCR</text>
  </g>

  
  <g id="g_protein_trimer_complex" data-role="complex">
    <use href="#g_protein_trimer" x="385" y="250" width="90" height="60" />
    <text x="430" y="330" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">G-protein</text>
  </g>

  
  <g id="adenylyl_cyclase" data-role="enzyme">
    <use href="#kinase" x="550" y="350" width="80" height="50" />
    <text x="590" y="340" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">AC</text>
  </g>

  
  <g id="camp_molecule" data-role="small_molecule">
    <use href="#camp" x="700" y="380" width="50" height="32" />
    <text x="725" y="370" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">cAMP</text>
  </g>

  
  <g id="pka_kinase" data-role="enzyme">
    <use href="#kinase" x="850" y="480" width="80" height="50" />
    <text x="890" y="470" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">PKA</text>
  </g>

  
  <g id="downstream_target" data-role="protein">
    <use href="#generic_protein" x="1000" y="580" width="80" height="50" />
    <text x="1040" y="570" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">Target</text>
    <use href="#p_badge" x="1055" y="575" width="24" height="24" />
  </g>

  
  <g id="signaling_arrows" data-role="arrows">
    
    <path d="M 420 170 V 190" stroke="#333" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)" />
    
    <path d="M 430 240 V 250" stroke="#333" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)" />
    
    <path d="M 475 280 H 520 C 535 280, 535 375, 550 375 H 550" stroke="#333" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)" />
    
    <path d="M 630 375 H 680" stroke="#333" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)" />
    
    <path d="M 725 412 V 450 C 725 465, 870 465, 870 480 V 480" stroke="#333" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)" />
    
    <path d="M 930 505 H 980 C 995 505, 995 605, 1000 605 H 1000" stroke="#333" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)" />
  </g>

</svg>