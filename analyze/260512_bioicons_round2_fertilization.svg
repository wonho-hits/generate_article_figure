  <g id="figure_title" data-role="title">
    <text x="800" y="50" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Early mammalian development: fertilization to first cleavage</text>
  </g>

  
  <g id="fertilization_panel" data-role="panel">
    <g id="egg_sperm_pre_fertilization" data-role="embryo">
      
      <circle cx="400" cy="450" r="40" fill="white" stroke="#666666" stroke-width="1.5" />
      
      <circle cx="400" cy="450" r="35" fill="none" stroke="#6699ff" stroke-width="1.5" />
      
      <g id="sperm" data-role="cell">
        <ellipse cx="335" cy="450" rx="8" ry="12" fill="#3366cc" stroke="#3366cc" stroke-width="1" />
        <path d="M 327 450 Q 290 420 280 450 Q 290 480 327 450" fill="none" stroke="#3366cc" stroke-width="1.5" stroke-linecap="round" />
      </g>
    </g>
    <text x="400" y="530" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Fertilization</text>
  </g>

  
  <g id="arrow_fertilization_to_zygote" data-role="arrow">
    <line x1="480" y1="450" x2="720" y2="450" stroke="#333333" stroke-width="2.5" marker-end="url(#arrowhead)" />
  </g>

  
  <g id="zygote_panel" data-role="panel">
    <use href="#bioicons_zygote" x="760" y="410" width="80" height="80" />
    <text x="800" y="530" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Zygote (1-cell embryo)</text>
  </g>

  
  <g id="arrow_zygote_to_2cell" data-role="arrow">
