<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900"><defs>
<symbol id="kinase" viewBox="0 0 80 50" overflow="visible">
        <ellipse cx="40" cy="25" rx="35" ry="20" fill="#B5D4A8" stroke="#4A7A3F" stroke-width="2" />
    </symbol>
<symbol id="nucleus" viewBox="0 0 200 150" overflow="visible">
        <ellipse cx="100" cy="75" rx="92" ry="65" fill="#F0E0F0" stroke="#5A2A7C" stroke-width="2.5" />
        <ellipse cx="100" cy="75" rx="86" ry="60" fill="none" stroke="#5A2A7C" stroke-width="1" opacity="0.6" />
        <circle cx="20" cy="60" r="3" fill="#5A2A7C" />
        <circle cx="180" cy="65" r="3" fill="#5A2A7C" />
        <circle cx="100" cy="12" r="3" fill="#5A2A7C" />
        <circle cx="100" cy="138" r="3" fill="#5A2A7C" />
    </symbol>
<symbol id="transcription_factor" viewBox="0 0 60 50" overflow="visible">
        
        <path d="M 10 30 Q 10 6 30 6 Q 50 6 50 30 Z" fill="#B5D4A8" stroke="#4A7A3F" stroke-width="2" stroke-linejoin="round" />
        
        <line x1="17" y1="30" x2="17" y2="42" stroke="#4A7A3F" stroke-width="2.5" stroke-linecap="round" />
        <line x1="43" y1="30" x2="43" y2="42" stroke="#4A7A3F" stroke-width="2.5" stroke-linecap="round" />
        
        <path d="M 2 45 Q 12 41 22 45 T 42 45 Q 52 41 58 45" fill="none" stroke="#888888" stroke-width="1.5" />
        <path d="M 2 48 Q 12 52 22 48 T 42 48 Q 52 52 58 48" fill="none" stroke="#888888" stroke-width="1.5" />
    </symbol>
<symbol id="rtk" viewBox="0 0 60 100" overflow="visible">
        <rect x="10" y="5" width="40" height="32" rx="4" fill="#A8C5E2" stroke="#3A5F7F" stroke-width="2" />
        <rect x="22" y="37" width="16" height="22" fill="#A8C5E2" stroke="#3A5F7F" stroke-width="2" />
        <ellipse cx="30" cy="78" rx="22" ry="16" fill="#B5D4A8" stroke="#4A7A3F" stroke-width="2" />
        <text x="30" y="83" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#4A7A3F" font-weight="bold">K</text>
    </symbol>
<symbol id="p_badge" viewBox="0 0 24 24" overflow="visible">
        <circle cx="12" cy="12" r="10" fill="#FF6B47" stroke="#A33020" stroke-width="1.5" />
        <text x="12" y="16" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="white" font-weight="bold">P</text>
    </symbol>
<symbol id="small_gtpase" viewBox="0 0 52 48" overflow="visible">
        
        <path d="M 26 4 L 46 36 Q 26 46 6 36 Z" fill="#C5B5D4" stroke="#5F4A7F" stroke-width="2" stroke-linejoin="round" />
        
        <circle cx="36" cy="24" r="7" fill="#FFE8B0" stroke="#C8901F" stroke-width="1.5" />
        <text x="36" y="27" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#C8901F" font-weight="bold">T</text>
    </symbol>
<symbol id="ligand" viewBox="0 0 40 30" overflow="visible">
        
        <path d="M 20 5 Q 8 5 8 15 Q 8 25 20 25 Q 32 25 32 15 Q 32 5 20 5 Z" fill="#FFD8B0" stroke="#C86B1F" stroke-width="1.8" stroke-linejoin="round" />
        
        <circle cx="14" cy="13" r="3" fill="#FFC890" stroke="#C86B1F" stroke-width="1.2" />
        <circle cx="26" cy="17" r="3" fill="#FFC890" stroke="#C86B1F" stroke-width="1.2" />
    </symbol>
</defs>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  
  <g id="cell_membrane">
    <line x1="0" y1="300" x2="1400" y2="300" stroke="#888" stroke-width="2" />
    <line x1="0" y1="320" x2="1400" y2="320" stroke="#888" stroke-width="2" />
  </g>

  
  <g id="compartment_labels">
    <text x="100" y="100" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Extracellular</text>
    <text x="100" y="390" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Cytoplasm</text>
  </g>

  
  <g id="egf_egfr_binding">
    <g id="egf">
      <use href="#ligand" x="250" y="160" width="40" height="30" />
      <text x="270" y="140" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#333">EGF</text>
    </g>
    <g id="egfr">
      <use href="#rtk" x="230" y="270" width="60" height="100" />
      <text x="260" y="240" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#333">EGFR</text>
    </g>
    <path d="M270,190 C270,220 270,250 270,270" fill="none" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />
  </g>

  
  <g id="kinase_cascade">
    <g id="ras">
      <use href="#small_gtpase" x="420" y="420" width="52" height="48" />
      <text x="446" y="400" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#333">Ras</text>
    </g>
    <g id="raf">
      <use href="#kinase" x="600" y="500" width="80" height="50" />
      <text x="640" y="480" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#333">Raf</text>
    </g>
    <g id="mek">
      <use href="#kinase" x="780" y="600" width="80" height="50" />
      <text x="820" y="580" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#333">MEK</text>
    </g>
    <g id="erk">
      <use href="#kinase" x="960" y="700" width="80" height="50" />
      <text x="1000" y="680" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#333">ERK</text>
    </g>

    
    <path d="M270,370 L380,390 C390,395 400,410 420,435" fill="none" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />
    <path d="M472,445 L580,470 C590,475 600,490 610,510" fill="none" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />
    <path d="M680,525 L760,550 C770,555 780,570 790,600" fill="none" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />
    <use href="#p_badge" x="850" y="605" width="24" height="24" />
    <path d="M860,625 L940,650 C950,655 960,670 970,700" fill="none" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />
    <use href="#p_badge" x="1030" y="705" width="24" height="24" />
  </g>

  
  <g id="nucleus_and_gene_expression">
    <g id="nucleus_container">
      <use href="#nucleus" x="100" y="650" width="200" height="150" />
      <text x="200" y="620" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Nucleus</text>
    </g>

    <g id="transcription_factor">
      <use href="#transcription_factor" x="170" y="710" width="60" height="50" />
      <text x="200" y="685" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#333">Transcription Factor</text>
    </g>

    <text x="200" y="830" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#333">Target Gene</text>
    <text x="200" y="855" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-style="italic" fill="#555">Gene Expression</text>

    
    <path d="M1000,750 C1000,780 950,800 850,800 C750,800 650,780 550,750 C450,720 380,710 300,710" fill="none" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />
    <text x="650" y="775" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#555">Nuclear Translocation</text>
    <use href="#p_badge" x="220" y="700" width="24" height="24" /> 

    
    <path d="M200,760 L200,810" fill="none" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />
  </g>
</svg>