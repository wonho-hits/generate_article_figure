<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200"><defs>
<symbol id="gpcr" viewBox="0 0 60 80" overflow="visible">
        <rect x="5" y="5" width="50" height="70" rx="6" fill="#A8C5E2" stroke="#3A5F7F" stroke-width="2" />
        <path d="M 12 14 L 48 22 L 12 30 L 48 38 L 12 46 L 48 54 L 12 62 L 48 70" fill="none" stroke="#3A5F7F" stroke-width="1.5" opacity="0.8" />
    </symbol>
<symbol id="ligand" viewBox="0 0 40 30" overflow="visible">
        
        <path d="M 20 5 Q 8 5 8 15 Q 8 25 20 25 Q 32 25 32 15 Q 32 5 20 5 Z" fill="#FFD8B0" stroke="#C86B1F" stroke-width="1.8" stroke-linejoin="round" />
        
        <circle cx="14" cy="13" r="3" fill="#FFC890" stroke="#C86B1F" stroke-width="1.2" />
        <circle cx="26" cy="17" r="3" fill="#FFC890" stroke="#C86B1F" stroke-width="1.2" />
    </symbol>
<symbol id="generic_protein" viewBox="0 0 80 50" overflow="visible">
        <rect x="5" y="5" width="70" height="40" rx="20" fill="#D4D4D4" stroke="#666666" stroke-width="2" />
    </symbol>
<symbol id="complex" viewBox="0 0 110 60" overflow="visible">
        <ellipse cx="30" cy="30" rx="25" ry="18" fill="#B5D4A8" stroke="#4A7A3F" stroke-width="2" />
        <ellipse cx="62" cy="30" rx="25" ry="18" fill="#A8C5D4" stroke="#4A6F7F" stroke-width="2" />
        <ellipse cx="88" cy="30" rx="20" ry="14" fill="#D4C5A8" stroke="#7F6F4A" stroke-width="2" />
    </symbol>
<symbol id="transcription_factor" viewBox="0 0 60 50" overflow="visible">
        
        <path d="M 10 30 Q 10 6 30 6 Q 50 6 50 30 Z" fill="#B5D4A8" stroke="#4A7A3F" stroke-width="2" stroke-linejoin="round" />
        
        <line x1="17" y1="30" x2="17" y2="42" stroke="#4A7A3F" stroke-width="2.5" stroke-linecap="round" />
        <line x1="43" y1="30" x2="43" y2="42" stroke="#4A7A3F" stroke-width="2.5" stroke-linecap="round" />
        
        <path d="M 2 45 Q 12 41 22 45 T 42 45 Q 52 41 58 45" fill="none" stroke="#888888" stroke-width="1.5" />
        <path d="M 2 48 Q 12 52 22 48 T 42 48 Q 52 52 58 48" fill="none" stroke="#888888" stroke-width="1.5" />
    </symbol>
<symbol id="kinase" viewBox="0 0 80 50" overflow="visible">
        <ellipse cx="40" cy="25" rx="35" ry="20" fill="#B5D4A8" stroke="#4A7A3F" stroke-width="2" />
    </symbol>
<symbol id="nucleus" viewBox="0 0 200 150" overflow="visible">
        <ellipse cx="100" cy="75" rx="92" ry="65" fill="#F0E0F0" stroke="#5A2A7C" stroke-width="2.5" />
        <ellipse cx="100" cy="75" rx="86" ry="60" fill="none" stroke="#5A2A7C" stroke-width="1" opacity="0.6" />
        <circle cx="20" cy="60" r="3" fill="#5A2A7C" />
        <circle cx="180" cy="65" r="3" fill="#5A2A7C" />
        <circle cx="100" cy="12" r="3" fill="#5A2A7C" />
        <circle cx="100" cy="138" r="3" fill="#5A2A7C" />
    </symbol>
</defs>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
    <marker id="inhibition_bar" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <line x1="0" y1="5" x2="10" y2="5" stroke="#333" stroke-width="2" />
      <line x1="5" y1="0" x2="5" y2="10" stroke="#333" stroke-width="2" />
    </marker>
    <filter id="stage_shadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.12" />
    </filter>
  </defs>

  <g id="figure_title">
    <text x="400" y="40" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Wnt/β-catenin Signaling Pathway</text>
  </g>

  <g id="extracellular_compartment" data-role="compartment">
    <text x="60" y="100" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#666666">Extracellular</text>
  </g>

  <g id="wnt_ligand" data-role="ligand">
    <use href="#ligand" x="380" y="140" width="40" height="30" />
    <text x="400" y="125" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle">Wnt Ligand</text>
  </g>

  <g id="cell_membrane" data-role="membrane">
    <line x1="0" y1="280" x2="800" y2="280" stroke="#888" stroke-width="2" />
    <line x1="0" y1="300" x2="800" y2="300" stroke="#888" stroke-width="2" />
  </g>

  <g id="frizzled_receptor" data-role="receptor">
    <use href="#gpcr" x="370" y="225" width="60" height="80" />
    <text x="400" y="210" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle">Frizzled Receptor</text>
  </g>

  <g id="wnt_to_frizzled_activation_arrow">
    <path d="M 400 170 V 225" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" />
  </g>

  <g id="cytoplasm_compartment" data-role="compartment">
    <text x="60" y="360" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#666666">Cytoplasm</text>
  </g>

  <g id="destruction_complex" data-role="protein_complex">
    <use href="#complex" x="345" y="420" width="110" height="60" />
    <text x="400" y="405" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle">Destruction Complex</text>
    <text x="400" y="445" font-family="Helvetica, Arial, sans-serif" font-size="12" text-anchor="middle">(APC, Axin, GSK-3β)</text>
    
    <use href="#kinase" x="480" y="440" width="80" height="50" transform="scale(0.6)" opacity="0.7" />
    <text x="500" y="435" font-family="Helvetica, Arial, sans-serif" font-size="10" text-anchor="middle">GSK-3β</text>
  </g>

  <g id="frizzled_to_destruction_complex_inhibition_arrow">
    <path d="M 400 300 V 380 C 400 390, 420 400, 400 420" stroke="#333" stroke-width="2.5" marker-end="url(#inhibition_bar)" />
  </g>

  <g id="cytoplasmic_beta_catenin" data-role="generic_protein">
    <use href="#generic_protein" x="360" y="620" width="80" height="50" />
    <text x="400" y="605" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle">β-catenin</text>
    <text x="400" y="685" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555" text-anchor="middle">(accumulates)</text>
  </g>

  <g id="nucleus_compartment_body" data-role="nucleus_compartment">
    <use href="#nucleus" x="200" y="900" width="400" height="300" />
    <text x="60" y="850" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#666666">Nucleus</text>
  </g>

  <g id="beta_catenin_translocation_arrow">
    <path d="M 400 670 V 780 L 400 780 L 400 860 C 400 890, 360 920, 320 950" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" fill="none" />
    <text x="400" y="750" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555" text-anchor="middle">(Translocation)</text>
  </g>

  <g id="nuclear_beta_catenin" data-role="generic_protein">
    <use href="#generic_protein" x="280" y="980" width="80" height="50" />
    <text x="320" y="965" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle">β-catenin</text>
  </g>

  <g id="tcf_lef_transcription_factor" data-role="transcription_factor">
    <use href="#transcription_factor" x="460" y="980" width="60" height="50" />
    <text x="490" y="965" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle">TCF/LEF</text>
  </g>

  <g id="target_genes" data-role="target_gene">
    <rect x="420" y="1100" width="150" height="40" rx="8" ry="8" fill="#E8EEF7" stroke="#3A5F7F" stroke-width="2" filter="url(#stage_shadow)" />
    <text x="495" y="1090" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#3A5F7F" text-anchor="middle">Target Genes</text>
    <text x="495" y="1125" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#3A5F7F" text-anchor="middle">Myc, cyclin D1</text>
  </g>

  <g id="gene_activation_arrows">
    <path d="M 320 1030 C 320 1050, 400 1070, 420 1100" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" fill="none" />
    <path d="M 490 1030 C 490 1050, 500 1070, 500 1100" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" fill="none" />
    <text x="400" y="1040" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#555555" text-anchor="middle">(Complex formation)</text>
  </g>
</svg>