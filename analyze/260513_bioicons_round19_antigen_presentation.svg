  <g id="figure_title">
    <text x="800" y="50" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Antigen Presentation &amp; T-cell Activation</text>
  </g>

  <g id="macrophage_and_mhc" data-role="macrophage_presentation">
    <use href="#bioicons_macrophage" x="200" y="350" width="150" height="162" />
    <text x="275" y="540" font-family="Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#1a1a1a">Macrophage (APC)</text>
    <use href="#mhc_complex" x="350" y="310" width="60" height="80" />
    <text x="380" y="410" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#1a1a1a">MHC-II + Bacterial Peptide</text>
  </g>

  <g id="t_cell_and_tcr" data-role="t_cell_recognition">
    <use href="#bioicons_t_lymphocyte" x="1050" y="350" width="124" height="127" />
    <text x="1112" y="500" font-family="Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#1a1a1a">CD4+ T cell</text>
    <use href="#generic_membrane_protein" x="960" y="310" width="60" height="80" />
    <text x="990" y="410" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#1a1a1a">TCR</text>
  </g>

  <g id="immune_synapse_and_activation" data-role="binding_activation">
    <path d="M 1020 350 L 410 350" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" fill="none" />
    <text x="680" y="340" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#555">Binding / Immune Synapse</text>

    <path d="M 980 390 C 990 420, 1030 450, 1070 450" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" fill="none" />
    <text x="1020" y="430" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#555">Activation</text>
  </g>

  <g id="cytokine_release" data-role="cytokine_production">
    <path d="M 1150 370 C 1170 320, 1190 280, 1220 280" stroke="#333" stroke-width="2.5" marker-end="url(#arrowhead)" fill="none" />
    <use href="#ligand" x="1230" y="260" width="40" height="30" />
    <use href="#ligand" x="1270" y="290" width="40" height="30" />
    <use href="#ligand" x="1240" y="320" width="40" height="30" />
    <text x="1270" y="240" font-family="Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#1a1a1a">Cytokines</text>
  </g>
